<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>退休資產複利試算機（調色）</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", sans-serif;
            background: #f8f9fa;
            min-height: 100vh;
            padding: 20px 12px;
        }

        .container {
            max-width: 580px;
            margin: 0 auto;
        }

        .card {
            background: #ffffff;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10 30px rgba(0, 0, 0, 0.07);
        }

        .title {
            font-size: 26px;
            font-weight: 700;
            color: #212529;
            text-align: center;
            margin-bottom: 6px;
        }

        .sub-title {
            text-align: center;
            font-size: 14px;
            color: #6c757d;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 15px;
            font-weight: 500;
            color: #212529;
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            border: 1px solid #dee2e6;
            font-size: 16px;
            background: #fdfdfd;
            transition: all 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #e63946;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(230, 57, 70, 0.1);
        }

        .tip {
            font-size: 12px;
            color: #6c757d;
            margin-top: 6px;
        }

        /* 按鈕：濃郁石榴紅 超有活力 */
        .btn-calc {
            width: 100%;
            padding: 18px;
            border-radius: 14px;
            background: #e63946;
            color: #fff;
            font-size: 17px;
            font-weight: 600;
            border: none;
            margin-top: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-calc:hover {
            background: #d62828;
            transform: translateY(-1px);
        }

        .result-card {
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 16px;
        }

        /* 卡片 1：濃郁橘紅（活力、積極） */
        .result-1 {
            background: #fff0e3;
            border-left: 6px solid #ff7d00;
        }

        /* 卡片 2：濃郁墨綠（高級、穩定） */
        .result-2 {
            background: #e6f7f0;
            border-left: 6px solid #2a9d8f;
        }

        /* 卡片 3：濃郁紫（高級、精品） */
        .result-3 {
            background: #f7e6ff;
            border-left: 6px solid #9c27b0;
        }

        .section-title {
            font-weight: 700;
            font-size: 16px;
            color: #212529;
            margin-bottom: 16px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            font-size: 15px;
            color: #333;
            border-bottom: 1px solid #f1f1f1;
        }

        .row:last-child {
            border-bottom: 0;
        }

        .number-1 { color: #ff7d00; font-weight:700; }
        .number-2 { color: #2a9d8f; font-weight:700; }
        .number-3 { color: #9c27b0; font-weight:700; }

        .info-bar {
            text-align: center;
            font-size: 13px;
            color: #6c757d;
            padding: 12px;
            background: #fff;
            border-radius: 12px;
            margin: 10px 0 20px;
        }

        .formula-text {
            font-size: 13px;
            color: #444;
            line-height: 1.7;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <div class="title">退休資產複利試算機</div>
            <div class="sub-title">長期理財 · 安全提領 · 透明運算式</div>

            <div class="form-group">
                <label>目前年齡</label>
                <input type="number" id="age" placeholder="例如：36">
            </div>

            <div class="form-group">
                <label>預計退休年齡</label>
                <input type="number" id="retireAge" placeholder="例如：60">
            </div>

            <div class="form-group">
                <label>現有可投資現金</label>
                <input type="number" id="cash" placeholder="願意承擔風險、未來將投入市場的閒置資金">
                <div class="tip">緊急預備金不建議填入，建議保留6~12個月生活費</div>
            </div>

            <div class="form-group">
                <label>現有股票／ETF 總資產</label>
                <input type="number" id="stockAsset" placeholder="已持有、長期不賣出的股票與ETF市值">
            </div>

            <div class="form-group">
                <label>每月定期定額投入</label>
                <input type="number" id="monthSave" placeholder="每月固定理財金額">
            </div>

            <div class="form-group">
                <label>每年額外獎金投入</label>
                <input type="number" id="yearBonus" placeholder="年終、獎金等額外投入">
            </div>

            <div class="form-group">
                <label>長期年化報酬率</label>
                <select id="yearRate">
                    <option value="0.04">4% 極度保守</option>
                    <option value="0.05">5% 保守穩健</option>
                    <option value="0.06" selected>6% 中性合理</option>
                    <option value="0.07">7% 成長偏強</option>
                    <option value="0.08">8% 樂觀估算</option>
                </select>
            </div>

            <button class="btn-calc" onclick="calcAll()">開始試算</button>
        </div>

        <div class="info-bar">
            投資年限：<span id="yearCount" style="color:#e63946; font-weight:600;"></span>
            &nbsp;&nbsp;｜&nbsp;&nbsp;退休規劃至99歲｜通膨2.2%｜3%安全提領
        </div>

        <div class="result-card result-1">
            <div class="section-title">📊 名目金額（未扣通膨）</div>
            <div class="row">
                <span>最終總資產</span>
                <span class="number-1" id="totalNominal"></span>
            </div>
            <div class="row">
                <span>每月被動收入</span>
                <span class="number-1" id="monthNominal"></span>
            </div>
        </div>

        <div class="result-card result-2">
            <div class="section-title">🛡️ 實質購買力（扣通膨2.2%）</div>
            <div class="row">
                <span>實質總資產</span>
                <span class="number-2" id="totalReal"></span>
            </div>
            <div class="row">
                <span>實質每月可支配</span>
                <span class="number-2" id="monthReal"></span>
            </div>
        </div>

        <div class="result-card result-3">
            <div class="section-title">📑 運算公式與明細</div>
            <div class="formula-text" id="formulaBox"></div>
        </div>
    </div>

<script>
function calcLump(principal, rate, year){
    return principal * Math.pow(1 + rate, year);
}

function calcMonth(monthMoney, rate, year){
    let mr = rate / 12;
    let totalMonth = year * 12;
    return monthMoney * (Math.pow(1 + mr, totalMonth) - 1) / mr;
}

function calcBonus(bonus, rate, year){
    return bonus * (Math.pow(1 + rate, year) - 1) / rate;
}

function num(n){
    return Math.round(n).toLocaleString() + " 元";
}

function calcAll(){
    let age = Number(document.getElementById('age').value||0);
    let retire = Number(document.getElementById('retireAge').value||0);
    let cash = Number(document.getElementById('cash').value||0);
    let stock = Number(document.getElementById('stockAsset').value||0);
    let month = Number(document.getElementById('monthSave').value||0);
    let bonus = Number(document.getElementById('yearBonus').value||0);
    let rate = Number(document.getElementById('yearRate').value);
    const inflate = 0.022;

    let year = retire - age;
    if(year <= 0){ alert('退休年齡需大於目前年齡'); return; }

    let cashEnd = calcLump(cash, rate, year);
    let stockEnd = calcLump(stock, rate, year);
    let monthEnd = calcMonth(month, rate, year);
    let bonusEnd = calcBonus(bonus, rate, year);
    let totalNominal = cashEnd + stockEnd + monthEnd + bonusEnd;

    let realRate = rate - inflate;
    let cashReal = calcLump(cash, realRate, year);
    let stockReal = calcLump(stock, realRate, year);
    let monthReal = calcMonth(month, realRate, year);
    let bonusReal = calcBonus(bonus, realRate, year);
    let totalReal = cashReal + stockReal + monthReal + bonusReal;

    let monthNom = totalNominal * 0.03 / 12;
    let monthRe = totalReal * 0.03 / 12;

    document.getElementById('yearCount').innerText = year + " 年";
    document.getElementById('totalNominal').innerText = num(totalNominal);
    document.getElementById('monthNominal').innerText = num(monthNom);
    document.getElementById('totalReal').innerText = num(totalReal);
    document.getElementById('monthReal').innerText = num(monthRe);

    let f = `
    1.整筆複利：本金 × (1+年化)^年數<br>
    2.每月定額：月複利標準公式<br>
    3.實質報酬＝年化－2.2%通膨<br>
    4.每月收入＝總資產 × 3% ÷ 12<br><br>
    現金：${num(cash)} → ${num(cashEnd)}<br>
    股票ETF：${num(stock)} → ${num(stockEnd)}<br>
    每月定額累積：${num(monthEnd)}<br>
    獎金累積：${num(bonusEnd)}<br>
    總計：${num(totalNominal)}
    `;
    document.getElementById('formulaBox').innerHTML = f;
}
</script>
</body>
</html>
