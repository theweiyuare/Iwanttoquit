<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>退休複利完整試算機</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Noto Sans TC", 微軟正黑體, sans-serif;
            background-color: #f0f4f9;
            padding: 24px 16px;
            line-height: 1.6;
        }
        .wrap {
            max-width: 560px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 20px;
            padding: 28px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.06);
        }
        h3 {
            text-align: center;
            color: #2d3748;
            margin-bottom: 24px;
            font-weight: 600;
        }
        .item {
            margin-bottom: 16px;
        }
        label {
            display: block;
            color: #4a5568;
            margin-bottom: 6px;
            font-size: 15px;
        }
        input, select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            background: #fafbfd;
        }
        button {
            width: 100%;
            padding: 13px;
            background-color: #3182ce;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            margin-top: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover {
            background-color: #2b6cb0;
        }
        .result-wrap {
            margin-top: px;
        }
        .card {
            border-radius: 14px;
            padding: 18px;
            margin-top: 16px;
        }
        .card-blue {
            background: #f3f8ff;
        }
        .card-gray {
            background: #f7f8fa;
        }
        .tit {
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 10px;
            font-size: 16px;
        }
        .row-text {
            font-size: 15px;
            margin: 8px 0;
            color: #4a5568;
        }
        .num-bold {
            font-weight: 600;
            color: #2c5282;
        }
        .text-small {
            font-size: 13px;
            color: #718096;
            margin-top: 4px;
        }
    </style>
</head>
<body>
<div class="wrap">
    <h3>退休資產複利試算機</h3>

    <div class="item">
        <label>目前年齡</label>
        <input type="number" id="age" value="36">
    </div>
    <div class="item">
        <label>預計退休年齡</label>
        <input type="number" id="retireAge" value="60">
    </div>
    <div class="item">
        <label>現有閒置現金（元）</label>
        <input type="number" id="cash" value="1000000">
    </div>
    <div class="item">
        <label>股票＋ETF 總資產（元）</label>
        <input type="number" id="stockAsset" value="833809">
    </div>
    <div class="item">
        <label>每月定期定額總金額（元）</label>
        <input type="number" id="monthSave" value="18000">
    </div>
    <div class="item">
        <label>長期年化報酬率</label>
        <select id="yearRate">
            <option value="0.04">4% 極度保守</option>
            <option value="0.05">5% 保守穩健</option>
            <option value="0.06" selected>6% 中性合理</option>
            <option value="0.07">7% 成長偏強</option>
            <option value="0.08">8% 樂觀估算</option>
        </select>
    </div>

    <button onclick="calcAll()">開始試算</button>

    <div class="result-wrap">
        <div class="row-text">投資年限：<span class="num-bold" id="yearCount"></span></div>

        <div class="card card-blue">
            <div class="tit">名目金額（未扣除通膨）</div>
            <div class="row-text">最終累積總資產：<span class="num-bold" id="totalNominal"></span></div>
            <div class="row-text">退休每月被動收入(3%提領)：<span class="num-bold" id="monthNominal"></span></div>
            <div class="text-small">說明：單純複利增長，一般參考使用</div>
        </div>

        <div class="card card-gray">
            <div class="tit">實質購買力（扣除通膨2.2%）</div>
            <div class="row-text">實質資產價值：<span class="num-bold" id="totalReal"></span></div>
            <div class="row-text">實質每月可運用：<span class="num-bold" id="monthReal"></span></div>
            <div class="text-small">說明：貼近未來真實物價購買力</div>
        </div>
    </div>
</div>

<script>
// 一次性金額複利
function calcLump(principal, rate, year){
    return principal * Math.pow(1 + rate, year);
}
// 每月定期定額 月複利
function calcMonth(monthMoney, rate, year){
    let monthRate = rate / 12;
    let totalMonth = year * 12;
    return monthMoney * (Math.pow(1 + monthRate, totalMonth) - 1) / monthRate;
}

function calcAll(){
    let age = Number(document.getElementById('age').value);
    let retire = Number(document.getElementById('retireAge').value);
    let cash = Number(document.getElementById('cash').value);
    let stock = Number(document.getElementById('stockAsset').value);
    let month = Number(document.getElementById('monthSave').value);
    let rate = Number(document.getElementById('yearRate').value);
    let inflate = 0.022;

    let year = retire - age;

    // 名目計算
    let cashEnd = calcLump(cash, rate, year);
    let stockEnd = calcLump(stock, rate, year);
    let monthEnd = calcMonth(month, rate, year);
    let totalNominal = cashEnd + stockEnd + monthEnd;

    // 實質報酬(扣通膨)
    let realRate = rate - inflate;
    let cashReal = calcLump(cash, realRate, year);
    let stockReal = calcLump(stock, realRate, year);
    let monthReal = calcMonth(month, realRate, year);
    let totalReal = cashReal + stockReal + monthReal;

    // 被動收入 3%提領
    let monthInNominal = totalNominal * 0.03 / 12;
    let monthInReal = totalReal * 0.03 / 12;

    // 輸出格式化
    document.getElementById('yearCount').innerText = `${year} 年`;
    document.getElementById('totalNominal').innerText = Math.round(totalNominal).toLocaleString() + " 元";
    document.getElementById('monthNominal').innerText = Math.round(monthInNominal).toLocaleString() + " 元";
    document.getElementById('totalReal').innerText = Math.round(totalReal).toLocaleString() + " 元";
    document.getElementById('monthReal').innerText = Math.round(monthInReal).toLocaleString() + " 元";
}
</script>
</body>
</html>
