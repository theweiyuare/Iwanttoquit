<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>退休複利計算機</title>
    <style>
        body{font-family:Noto Sans TC,微軟正黑體;background:#f3f5f8;margin:0;padding:20px;}
        .box{max-width:580px;margin:0 auto;background:#fff;padding:24px;border-radius:20px;}
        h3{text-align:center;}
        .row{margin:12px 0;}
        label{display:block;margin-bottom:4px;}
        input,select{width:100%;padding:10px;box-sizing:border-box;border:1px #ccc solid;border-radius:8px;}
        button{width:100%;padding:12px;background:#3671d9;color:#fff;border:0;border-radius:8px;font-size:16px;}
        .res{margin-top:20px;padding:15px;background:#f5f7fa;border-radius:12px;}
    </style>
</head>
<body>
<div class="box">
    <h3>退休複利試算</h3>

    <div class="row">
        <label>目前年齡</label>
        <input type="number" id="age" value="36">
    </div>
    <div class="row">
        <label>退休年齡</label>
        <input type="number" id="retire" value="60">
    </div>
    <div class="row">
        <label>現金資產</label>
        <input type="number" id="cash" value="0">
    </div>
    <div class="row">
        <label>股票ETF資產</label>
        <input type="number" id="stock" value="0">
    </div>
    <div class="row">
        <label>每月定期定額</label>
        <input type="number" id="month" value="18000">
    </div>
    <div class="row">
        <label>年化報酬</label>
        <select id="rate">
            <option value="0.04">4%</option>
            <option value="0.05">5%</option>
            <option value="0.06" selected>6%</option>
            <option value="0.07">7%</option>
            <option value="0.08">8%</option>
        </select>
    </div>

    <button onclick="runCalc()">開始試算</button>

    <div class="res">
        <div>投資年數：<span id="yearTxt"></span></div>
        <div>名目總資產：<span id="totalTxt"></span></div>
        <div>每月被動收入：<span id="monthTxt"></span></div>
        <hr>
        <div><small>通膨2.2% 實質購買力</small></div>
        <div>實質總資產：<span id="realTotalTxt"></span></div>
        <div>實質月收入：<span id="realMonthTxt"></span></div>
    </div>
</div>

<script>
// 整筆複利
function lumpSum(money,rate,year){
    return money * Math.pow(1+rate,year);
}
// 定期定額
function dinge(d,rate,year){
    let mr = rate / 12;
    let all = year * 12;
    return d * (Math.pow(1+mr,all)-1) / mr;
}

function runCalc(){
    let age = Number(document.getElementById('age').value);
    let retire = Number(document.getElementById('retire').value);
    let cash = Number(document.getElementById('cash').value);
    let stock = Number(document.getElementById('stock').value);
    let month = Number(document.getElementById('month').value);
    let r = Number(document.getElementById('rate').value);
    let inf = 0.022;

    let y = retire - age;

    let total = lumpSum(cash,r,y) + lumpSum(stock,r,y) + dinge(month,r,y);
    let realR = r - inf;
    let realTotal = lumpSum(cash,realR,y) + lumpSum(stock,realR,y) + dinge(month,realR,y);

    document.getElementById('yearTxt').innerText = y + " 年";
    document.getElementById('totalTxt').innerText = Math.round(total).toLocaleString() + " 元";
    document.getElementById('monthTxt').innerText = Math.round(total*0.03/12).toLocaleString() + " 元";
    document.getElementById('realTotalTxt').innerText = Math.round(realTotal).toLocaleString() + " 元";
    document.getElementById('realMonthTxt').innerText = Math.round(realTotal*0.03/12).toLocaleString() + " 元";
}
</script>
</body>
</html>
