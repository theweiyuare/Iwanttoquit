<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>通用退休資產複利試算機｜附完整算式明細</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Noto Sans TC", 微軟正黑體, sans-serif;
            background-color: #f0f4f9;
            padding: 24px 16px;
            line-height: 1.6;
        }
        .wrap {
            max-width: 580px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 20px;
            padding: 28px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.06);
        }
        h3 {
            text-align: center;
            color: #2d3748;
            margin-bottom: 24px;
            font-weight: 600;
        }
        .item {
            margin-bottom: 16px;
        }
        label {
            display: block;
            color: #4a5568;
            margin-bottom: 6px;
            font-size: 15px;
        }
        input, select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            background: #fafbfd;
        }
        button {
            width: 100%;
            padding: 13px;
            background-color: #3182ce;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            margin-top: 8px;
            cursor: pointer;
        }
        .card {
            border-radius: 14px;
            padding: 18px;
            margin-top: 16px;
        }
        .card-blue { background: #f3f8ff; }
        .card-gray { background: #f7f8fa; }
        .card-formula { background: #fef8f0; margin-top:12px; }
        .tit {
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 10px;
            font-size: 16px;
        }
        .row-text {
            font-size: 15px;
            margin: 6px 0;
            color: #4a5568;
        }
        .num-bold {
            font-weight: 600;
            color: #2c5282;
        }
        .text-small {
            font-size: 13px;
            color: #718096;
        }
        .formula-text {
            font-size: 13px;
            color: #5c4b38;
            line-height: 1.8;
        }
    </style>
</head>
<body>
<div class="wrap">
    <h3>退休資產複利試算機</h3>

    <div class="item">
        <label>目前年齡</label>
        <input type="number" id="age" placeholder="例如：36">
    </div>
    <div class="item">
        <label>預計退休年齡</label>
        <input type="number" id="retireAge" placeholder="例如：60">
    </div>
    <div class="item">
        <label>現有可投資現金</label>
        <input type="number" id="cash" placeholder="僅填願意承擔風險且預備投入之資金，緊急預備金勿填入">
        <div class="text-small">建議保留6~12個月生活費作為緊急預備金</div>
    </div>
    <div class="item">
        <label>現有股票／ETF 總資產</label>
        <input type="number" id="stockAsset" placeholder="長期持有股票、ETF合計市值">
    </div>
    <div class="item">
        <label>每月定期定額投入</label>
        <input type="number" id="monthSave" placeholder="每月固定理財投入金額">
    </div>
    <div class="item">
        <label>每年額外獎金投入</label>
        <input type="number" id="yearBonus" placeholder="年終、獎金等一次性額外理財">
    </div>
    <div class="item">
        <label>長期年化報酬率</label>
        <select id="yearRate">
            <option value="0.04">4% 極度保守</option>
            <option value="0.05">5% 保守穩健</option>
            <option value="0.06" selected>6% 中性合理</option>
            <option value="0.07">7% 成長偏強</option>
            <option value="0.08">8% 樂觀估算</option>
        </select>
    </div>

    <button onclick="calcAll()">開始試算</button>

    <div class="row-text" style="margin-top:16px;">投資年限：<span class="num-bold" id="yearCount"></span></div>
    <div class="text-small">※退休規劃至99歲｜固定通膨2.2%｜3%安全提領(不耗盡本金)</div>

    <!-- 結果區 -->
    <div class="card card-blue">
        <div class="tit">名目金額（未扣通膨）</div>
        <div class="row-text">最終總資產：<span class="num-bold" id="totalNominal"></span></div>
        <div class="row-text">退休每月被動收入：<span class="num-bold" id="monthNominal"></span></div>
    </div>

    <div class="card card-gray">
        <div class="tit">實質購買力（扣通膨2.2%）</div>
        <div class="row-text">實質總資產：<span class="num-bold" id="totalReal"></span></div>
        <div class="row-text">實質每月可支配：<span class="num-bold" id="monthReal"></span></div>
    </div>

    <!-- 完整算式&明細揭露 -->
    <div class="card card-formula">
        <div class="tit">📑 運算公式 &amp; 逐筆明細</div>
        <div class="formula-text" id="formulaBox"></div>
    </div>
</div>

<script>
// 公式1：整筆一次性複利(現金/股票ETF)
function calcLump(principal, rate, year){
    return principal * Math.pow(1 + rate, year);
}
// 公式2：每月定期定額 月複利
function calcMonth(monthMoney, rate, year){
    let monthRate = rate / 12;
    let totalMonth = year * 12;
    return monthMoney * (Math.pow(1 + monthRate, totalMonth) - 1) / monthRate;
}
// 公式3：每年年度投入 年複利
function calcBonus(bonus, rate, year){
    return bonus * (Math.pow(1 + rate, year) - 1) / rate;
}

// 格式化數字
function numFormat(n){
    return Math.round(n).toLocaleString();
}

function calcAll(){
    let age = Number(document.getElementById('age').value || 0);
    let retire = Number(document.getElementById('retireAge').value || 0);
    let cash = Number(document.getElementById('cash').value || 0);
    let stock = Number(document.getElementById('stockAsset').value || 0);
    let month = Number(document.getElementById('monthSave').value || 0);
    let bonus = Number(document.getElementById('yearBonus').value || 0);
    let rate = Number(document.getElementById('yearRate').value);
    const inflate = 0.022;

    let year = retire - age;
    if(year <= 0){
        alert('退休年齡需大於目前年齡');
        return;
    }

    // ===== 名目端計算 =====
    let cashEnd = calcLump(cash, rate, year);
    let stockEnd = calcLump(stock, rate, year);
    let monthEnd = calcMonth(month, rate, year);
    let bonusEnd = calcBonus(bonus, rate, year);
    let totalNominal = cashEnd + stockEnd + monthEnd + bonusEnd;

    // ===== 實質端計算(扣通膨) =====
    let realRate = rate - inflate;
    let cashReal = calcLump(cash, realRate, year);
    let stockReal = calcLump(stock, realRate, year);
    let monthReal = calcMonth(month, realRate, year);
    let bonusReal = calcBonus(bonus, realRate, year);
    let totalReal = cashReal + stockReal + monthReal + bonusReal;

    // 每月提領
    let monthInNominal = totalNominal * 0.03 / 12;
    let monthInReal = totalReal * 0.03 / 12;

    // 基礎結果顯示
    document.getElementById('yearCount').innerText = `${year} 年`;
    document.getElementById('totalNominal').innerText = numFormat(totalNominal) + " 元";
    document.getElementById('monthNominal').innerText = numFormat(monthInNominal) + " 元";
    document.getElementById('totalReal').innerText = numFormat(totalReal) + " 元";
    document.getElementById('monthReal').innerText = numFormat(monthInReal) + " 元";

    // ===== 揭露完整算式+明細 =====
    let formulaHtml = "";
    formulaHtml += "【基礎公式】<br>";
    formulaHtml += "1.整筆資產：終值 = 本金 × (1+年化)^年數<br>";
    formulaHtml += "2.每月定額：月複利累積公式<br>";
    formulaHtml += "3.年度投入：年金複利公式<br>";
    formulaHtml += "4.實質報酬 = 年化 - 通膨(2.2%)<br>";
    formulaHtml += "5.每月被動收入 = 總資產 × 3% ÷ 12<br><br>";

    formulaHtml += "【名目逐筆終值】<br>";
    formulaHtml += "• 可投資現金：" + numFormat(cash) + " → " + numFormat(cashEnd) + " 元<br>";
    formulaHtml += "• 股票ETF資產：" + numFormat(stock) + " → " + numFormat(stockEnd) + " 元<br>";
    formulaHtml += "• 每月定期定額：每月" + numFormat(month) + " → 累計" + numFormat(monthEnd) + " 元<br>";
    formulaHtml += "• 每年獎金投入：每年" + numFormat(bonus) + " → 累計" + numFormat(bonusEnd) + " 元<br>";
    formulaHtml += "→ 名目合計：" + numFormat(totalNominal) + " 元<br><br>";

    formulaHtml += "【實質逐筆終值(扣2.2%通膨)】<br>";
    formulaHtml += "• 現金最終：" + numFormat(cashReal) + " 元<br>";
    formulaHtml += "• 股票ETF最終：" + numFormat(stockReal) + " 元<br>";
    formulaHtml += "• 每月定額累計：" + numFormat(monthReal) + " 元<br>";
    formulaHtml += "• 年度獎金累計：" + numFormat(bonusReal) + " 元<br>";
    formulaHtml += "→ 實質合計：" + numFormat(totalReal) + " 元";

    document.getElementById('formulaBox').innerHTML = formulaHtml;
}
</script>
</body>
</html>
